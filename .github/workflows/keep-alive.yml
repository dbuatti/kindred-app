name: Keep Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase database
        run: |
          curl -s --max-time 15 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/people?select=count&limit=0" \
            || echo "Supabase query failed"

      - name: Ping auth endpoint
        run: |
          curl -s --max-time 15 \
            "${{ secrets.SUPABASE_URL }}/auth/v1/settings" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            || echo "Auth ping failed"

      - name: Ping Vercel app
        run: |
          curl -s --max-time 15 \
            "${{ secrets.VERCEL_APP_URL }}" || echo "Vercel ping failed"
